name: Create hw1 Project Structure

on:
  workflow_dispatch:

jobs:
  create-hw1:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create hw1 folder structure and all files
        run: |
          set -e

          # ── Directory structure ──────────────────────────────────────────
          mkdir -p hw1/app/src/main/java/com/example/onboarding
          mkdir -p hw1/app/src/main/res/layout
          mkdir -p hw1/app/src/main/res/values
          mkdir -p hw1/app/src/main/res/drawable
          mkdir -p hw1/gradle/wrapper

          # ── settings.gradle ──────────────────────────────────────────────
          cat > hw1/settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "OnboardingApp"
include ':app'
EOF

          # ── build.gradle (root) ──────────────────────────────────────────
          cat > hw1/build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.1.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
}
EOF

          # ── gradle.properties ────────────────────────────────────────────
          cat > hw1/gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
EOF

          # ── gradle-wrapper.properties ────────────────────────────────────
          cat > hw1/gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          # ── app/build.gradle ─────────────────────────────────────────────
          cat > hw1/app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace 'com.example.onboarding'
    compileSdk 34
    defaultConfig {
        applicationId "com.example.onboarding"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}
dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
}
EOF

          # ── proguard-rules.pro ───────────────────────────────────────────
          touch hw1/app/proguard-rules.pro

          # ── AndroidManifest.xml ──────────────────────────────────────────
