package com.example.onboarding
import android.os.Bundle
import androidx.appcompat.app.AppCompatActivity
class MainActivity : AppCompatActivity(),
    Fragment1.Fragment1Listener,
    Fragment2.Fragment2Listener,
    Fragment3.Fragment3Listener {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)
        if (savedInstanceState == null) {
            supportFragmentManager.beginTransaction()
                .replace(R.id.fragment_container, Fragment1())
                .commit()
        }
    }
    override fun onFragment1Continue(name: String) {
        supportFragmentManager.beginTransaction()
            .replace(R.id.fragment_container, Fragment2.newInstance(name))
            .addToBackStack(null).commit()
    }
    override fun onFragment2Continue(name: String) {
        supportFragmentManager.beginTransaction()
            .replace(R.id.fragment_container, Fragment3.newInstance(name))
            .addToBackStack(null).commit()
    }
    override fun onCheckboxStateChanged(isChecked: Boolean) {}
}
EOF

          # ── Fragment1.kt ─────────────────────────────────────────────────
          cat > hw1/app/src/main/java/com/example/onboarding/Fragment1.kt << 'EOF'
package com.example.onboarding
import android.content.Context
import android.os.Bundle
import android.view.LayoutInflater
import android.view.View
import android.view.ViewGroup
import android.widget.Button
import android.widget.EditText
import androidx.fragment.app.Fragment
class Fragment1 : Fragment() {
    interface Fragment1Listener { fun onFragment1Continue(name: String) }
    private var listener: Fragment1Listener? = null
    override fun onAttach(context: Context) {
        super.onAttach(context)
        listener = context as? Fragment1Listener
            ?: throw ClassCastException("$context must implement Fragment1Listener")
    }
    override fun onCreateView(inflater: LayoutInflater, container: ViewGroup?, savedInstanceState: Bundle?): View? =
        inflater.inflate(R.layout.fragment_1, container, false)
    override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
        super.onViewCreated(view, savedInstanceState)
        val etName = view.findViewById<EditText>(R.id.etName)
        val btnNext = view.findViewById<Button>(R.id.btnNext)
        btnNext.setOnClickListener {
            val name = etName.text.toString().trim()
            if (name.isEmpty()) { etName.error = "Please enter your name"; return@setOnClickListener }
            listener?.onFragment1Continue(name)
        }
    }
    override fun onDetach() { super.onDetach(); listener = null }
}
EOF

          # ── Fragment2.kt ─────────────────────────────────────────────────
          cat > hw1/app/src/main/java/com/example/onboarding/Fragment2.kt << 'EOF'
package com.example.onboarding
import android.content.Context
import android.os.Bundle
import android.view.LayoutInflater
import android.view.View
import android.view.ViewGroup
import android.widget.Button
import android.widget.EditText
import androidx.fragment.app.Fragment
class Fragment2 : Fragment() {
    interface Fragment2Listener { fun onFragment2Continue(name: String) }
    private var listener: Fragment2Listener? = null
    override fun onAttach(context: Context) {
        super.onAttach(context)
        listener = context as? Fragment2Listener
            ?: throw ClassCastException("$context must implement Fragment2Listener")
    }
    override fun onCreateView(inflater: LayoutInflater, container: ViewGroup?, savedInstanceState: Bundle?): View? =
        inflater.inflate(R.layout.fragment_2, container, false)
    override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
        super.onViewCreated(view, savedInstanceState)
        val etName = view.findViewById<EditText>(R.id.etName)
        val etEmail = view.findViewById<EditText>(R.id.etEmail)
        val btnContinue = view.findViewById<Button>(R.id.btnContinue)
        arguments?.getString("USER_NAME")?.let { etName.setText(it) }
        btnContinue.setOnClickListener {
            val name = etName.text.toString().trim()
            val email = etEmail.text.toString().trim()
            if (name.isEmpty()) { etName.error = "Name is required"; return@setOnClickListener }
            if (email.isEmpty()) { etEmail.error = "Email is required"; return@setOnClickListener }
            listener?.onFragment2Continue(name)
        }
    }
    override fun onDetach() { super.onDetach(); listener = null }
    companion object {
        fun newInstance(userName: String): Fragment2 {
            val f = Fragment2()
            val args = Bundle()
            args.putString("USER_NAME", userName)
            f.arguments = args
            return f
        }
    }
}
EOF

          # ── Fragment3.kt ─────────────────────────────────────────────────
          cat > hw1/app/src/main/java/com/example/onboarding/Fragment3.kt << 'EOF'
package com.example.onboarding
import android.content.Context
import android.os.Bundle
import android.view.LayoutInflater
import android.view.View
import android.view.ViewGroup
import android.widget.Button
import android.widget.CheckBox
import android.widget.TextView
import android.widget.Toast
import androidx.fragment.app.Fragment
class Fragment3 : Fragment() {
    interface Fragment3Listener { fun onCheckboxStateChanged(isChecked: Boolean) }
    private var listener: Fragment3Listener? = null
    override fun onAttach(context: Context) {
        super.onAttach(context)
        listener = context as? Fragment3Listener
    }
    override fun onCreateView(inflater: LayoutInflater, container: ViewGroup?, savedInstanceState: Bundle?): View? =
        inflater.inflate(R.layout.fragment_3, container, false)
    override fun onViewCreated(view: View, savedInstanceState: Bundle?) {
        super.onViewCreated(view, savedInstanceState)
        val tvUserName = view.findViewById<TextView>(R.id.tvUserName)
        val cbAgree = view.findViewById<CheckBox>(R.id.cbAgree)
        val btnFinish = view.findViewById<Button>(R.id.btnFinish)
        val userName = arguments?.getString("USER_NAME") ?: "User"
        tvUserName.text = userName
        btnFinish.isEnabled = false
        cbAgree.setOnCheckedChangeListener { _, isChecked ->
            listener?.onCheckboxStateChanged(isChecked)
            btnFinish.isEnabled = isChecked
            btnFinish.alpha = if (isChecked) 1.0f else 0.5f
            btnFinish.text = if (isChecked) "Finish" else "Continue"
        }
        btnFinish.setOnClickListener {
            Toast.makeText(requireContext(), "Welcome, $userName!", Toast.LENGTH_LONG).show()
        }
    }
    override fun onDetach() { super.onDetach(); listener = null }
    companion object {
        fun newInstance(userName: String): Fragment3 {
            val f = Fragment3()
            val args = Bundle()
            args.putString("USER_NAME", userName)
            f.arguments = args
            return f
        }
    }
}
EOF

